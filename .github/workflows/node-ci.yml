name: Node.js CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout source code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Step 3: Install dependencies
      - name: Install dependencies
        working-directory: backend
        run: npm install

      # Step 4: Build Docker image
      - name: Build Docker image
        run: docker build -t express-app ./backend

      # Step 5: Run Docker container
      - name: Start Docker container
        run: |
          docker run -d --name express-container -p 3000:3000 express-app
          sleep 10

      # Step 6: Verify application health
      - name: Health Check
        run: curl --fail http://localhost:3000/health

      # Step 7: Cleanup
      - name: Cleanup
        if: always()
        run: |
          docker stop express-container || true
          docker rm express-container || true